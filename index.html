
    <!DOCTYPE html>
    <html>
    <head>
      <meta http-equiv="cache-control" content="no-cache">
      <meta http-equiv="expires" content="0">
      <meta http-equiv="pragma" content="no-cache">

      <!-- Google tag (gtag.js) -->
      <script async src="https://www.googletagmanager.com/gtag/js?id=G-LQMJH4ND3D"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-LQMJH4ND3D');
      </script>

      <title>Global Status</title>
      <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
      <style>
        body {
          background-color: #181818;
          color: #A9A9A9;
          font-family: Arial, sans-serif;
        }
        .container {
          max-width: 1400px;
          margin: 0 auto;
          padding: 20px;
        }
        h1 {
          text-align: center;
          color: #42f5e6;
        }
        .plot {
          margin: 40px 0;
          transition: opacity 0.5s ease, max-height 0.5s ease;
        }
        .plot.hidden {
          opacity: 0;
          max-height: 0;
          overflow: hidden;
          margin: 0;
        }
        .hint {
          position: fixed;
          bottom: 15px;
          right: 15px;
          font-size: 20px;
          color: #282828;
          font-family: monospace;
          letter-spacing: 1px;
          user-select: none;
        }
        .hint2 {
          position: fixed;
          bottom: 10px;
          left: 10px;
          font-size: 9px;
          color: #282828;
          font-family: monospace;
          letter-spacing: 1px;
          user-select: none;
          opacity: 0;
          transition: opacity 0.3s ease;
        }
        .hint2.visible {
          opacity: 1;
        }
        .secret-message {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: rgba(24, 24, 24, 0.98);
          border: 2px solid #42f5e6;
          padding: 30px 40px;
          border-radius: 10px;
          color: #42f5e6;
          font-size: 18px;
          text-align: center;
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.8s ease;
          z-index: 1000;
          max-width: 80%;
          box-shadow: 0 0 30px rgba(66, 245, 230, 0.3);
        }
        .secret-message.show {
          opacity: 1;
        }
      </style>

    </head>
    <body>
      <div class="container">
        <h1>The Death Index</h1>
        
        <div id="secretMessage" class="secret-message">
          The graph doesn't show you how many people are online.<br>
          It shows you how much of 'You' is left in the machine.
        </div>
        
        <div id="plot1" class="plot"></div>
        <div id="plot2" class="plot hidden"></div>
        
        <div class="hint">☠Ψ</div>
        <div class="hint2" id="hint2">01101101 01100001 01100011 01101000 01101001 01101110 01100101</div>
        
        <script>
          // First dataset
          let Counters1_1 = [786, 793, 793];
          let Counters1_2 = [9, 9, 9];
          let Counters1_3 = [0, 0, 0];
          let time1 = ["2026-02-22 01:29:10", "2026-02-22 01:30:33", "2026-02-22 01:31:55"];
          
          // Second dataset
          let Counters2_1 = [3078];
          let Counters2_2 = [17];
          let time2 = ["2026-02-22 01:31:29"];

          let firstUnlocked = false;

          // Secret message - Konami-style sequence
          let sequence = [];
          const correctSequence = ['d', 'e', 'a', 't', 'h'];
          const correctSequence2 = ['m', 'a', 'c', 'h', 'i', 'n', 'e'];
          const skipSequence = ['m', 'o', 'a', 'd'];
          const secretMessage = document.getElementById('secretMessage');
          const plot2 = document.getElementById('plot2');
          const hint2 = document.getElementById('hint2');
          
          document.addEventListener('keydown', (e) => {
            sequence.push(e.key.toLowerCase());
            
            // Keep only last 7 keys (for "machine")
            if (sequence.length > 7) {
              sequence.shift();
            }
            
            // Hidden shortcut - Ctrl+Shift+X to skip everything
            if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'x') {
              firstUnlocked = true;
              plot2.classList.remove('hidden');
              setTimeout(() => {
                plotData2();
              }, 100);
              hint2.classList.remove('visible');
              return;
            }
            
            // Alternative shortcut - type "moad"
            if (sequence.slice(-4).join('') === skipSequence.join('')) {
              firstUnlocked = true;
              plot2.classList.remove('hidden');
              setTimeout(() => {
                plotData2();
              }, 100);
              hint2.classList.remove('visible');
              sequence = [];
              return;
            }
            
            // Check first sequence (death)
            if (!firstUnlocked && sequence.slice(-5).join('') === correctSequence.join('')) {
              secretMessage.classList.add('show');
              setTimeout(() => {
                secretMessage.classList.remove('show');
                hint2.classList.add('visible');
              }, 7000);
              firstUnlocked = true;
              sequence = [];
            }
            
            // Check second sequence (machine)
            if (firstUnlocked && sequence.join('') === correctSequence2.join('')) {
              plot2.classList.remove('hidden');
              setTimeout(() => {
                plotData2();
              }, 100);
              hint2.classList.remove('visible');
              sequence = [];
            }
          });

          function plotData1() {
            const trace1 = {
              x: time1,
              y: Counters1_1,
              name: 'Long Https',
              type: 'scatter',
              mode: 'lines',
              fill: 'tozeroy',
              line: {color: '#42f5e6'}
            };
            const trace2 = {
              x: time1,
              y: Counters1_2,
              name: 'Domestic',
              yaxis: 'y2',
              type: 'scatter',
              mode: 'lines',
              fill: 'tozeroy',
              line: {color: '#f542e9'}
            };
            const trace3 = {
              x: time1,
              y: Counters1_3,
              name: 'bidirectionale',
              type: 'scatter',
              mode: 'lines',
              fill: 'tozeroy',
              line: {color: '#f5e642'}
            };

            const layout = {
              title: 'WEIGHTED Data Over Last Week',
              xaxis: {title: 'Tehran Time', color: '#A9A9A9'},
              yaxis: {title: 'Total Long Https', color: '#A9A9A9'},
              yaxis2: {
                title: 'Total Special',
                overlaying: 'y',
                side: 'right',
                color: '#A9A9A9',
                range: [0, Math.max(...Counters1_1)/15]
              },
              plot_bgcolor: '#181818',
              paper_bgcolor: '#181818',
              font: {color: '#A9A9A9'}
            };

            Plotly.newPlot('plot1', [trace1, trace2, trace3], layout, {displayModeBar: false});
          }
          
          function plotData2() {
            const trace1 = {
              x: time2,
              y: Counters2_1,
              name: 'Long Https',
              type: 'scatter',
              mode: 'lines',
              fill: 'tozeroy',
              line: {color: '#42f5e6'}
            };
            const trace2 = {
              x: time2,
              y: Counters2_2,
              name: 'Domestic',
              yaxis: 'y2',
              type: 'scatter',
              mode: 'lines',
              fill: 'tozeroy',
              line: {color: '#f542e9'}
            };

            const layout = {
              title: 'WEIGHTED Data Over Last Week',
              xaxis: {title: 'Tehran Time', color: '#A9A9A9'},
              yaxis: {title: 'Total Long Https', color: '#A9A9A9'},
              yaxis2: {
                title: 'Total Special',
                overlaying: 'y',
                side: 'right',
                color: '#A9A9A9',
                range: [0, Math.max(...Counters2_1)/15]
              },
              plot_bgcolor: '#181818',
              paper_bgcolor: '#181818',
              font: {color: '#A9A9A9'}
            };

            Plotly.newPlot('plot2', [trace1, trace2], layout, {displayModeBar: false});
          }
          
          // Plot only first data when page loads
          plotData1();
        </script>
      </div>
    </body>

    </html>
